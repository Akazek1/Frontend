<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Theme-adaptive favicon: dark-green mark on light browser themes,
       white mark on dark themes. PNG marks embedded as data URIs because
       the brand mark only exists as raster art (no vector source). -->
  <style>
    .on-dark { display: none; }
    @media (prefers-color-scheme: dark) {
      .on-light { display: none; }
      .on-dark { display: inline; }
    }
  </style>
  <image class="on-light" width="64" height="64" href="data:image/png;base64,"/>
  <image class="on-dark" width="64" height="64" href="data:image/png;base64,"/>
</svg>
