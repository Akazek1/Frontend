<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#145B10" />
    <title>Akazek - Offline</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, Helvetica, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100dvh;
        background: #f4f7f3;
        color: #111827;
        display: grid;
        place-items: center;
        padding: 32px 24px;
      }

      main {
        width: min(100%, 360px);
        text-align: center;
      }

      .logo {
        width: 64px;
        height: 64px;
        margin: 0 auto 20px;
        border-radius: 16px;
        background: #fff;
        box-shadow: 0 2px 10px rgba(20, 91, 16, 0.08);
        display: grid;
        place-items: center;
      }

      .logo img {
        width: 40px;
        height: 40px;
        object-fit: contain;
      }

      h1 {
        margin: 0;
        font-size: 22px;
        line-height: 1.2;
      }

      p {
        margin: 10px 0 0;
        color: #4b5563;
        font-size: 14px;
        line-height: 1.6;
      }

      button {
        margin-top: 22px;
        border: 0;
        background: #145b10;
        color: #fff;
        font-size: 14px;
        font-weight: 700;
        padding: 11px 22px;
        border-radius: 12px;
        cursor: pointer;
      }

      button:active {
        background: #0f4a0c;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="logo">
        <img src="/brand/akazek-mark-dark-tight.png" alt="Akazek" />
      </div>
      <h1>You're offline</h1>
      <p>Check your connection and try again. We'll reload automatically once you're back online.</p>
      <button id="retry" type="button">Try again</button>
    </main>
    <script>
      // This is a static dead-end page (an installed PWA has no reload/back
      // button), so it must recover itself. Reload as soon as the server is
      // actually reachable again — not just when the browser reports "online",
      // which is unreliable on iOS.
      var reloading = false;
      function recover() {
        if (reloading) return;
        reloading = true;
        location.reload();
      }
      async function check() {
        try {
          var r = await fetch("/manifest.webmanifest", { cache: "no-store" });
          if (r && r.ok) recover();
        } catch (e) {
          /* still offline */
        }
      }
      document.getElementById("retry").addEventListener("click", function () {
        location.reload();
      });
      window.addEventListener("online", check);
      setInterval(check, 4000);
      check();
    </script>
  </body>
</html>
